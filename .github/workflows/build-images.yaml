name: Build images

on:
  push:
    paths-ignore:
      - HUB.md
      - QUAY.md
      - README.md
      - LICENSE
  workflow_dispatch:

env:
  REPOSITORY: workflow

jobs:
  build-base:
    name: Build base and store in GHCR
    runs-on: ubuntu-latest
    environment:
      name: GHCR
      url: https://ghcr.io/its-me/workflow
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.list }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          tags="base"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tags="$tags base-${GITHUB_REF_NAME#v}"
          fi
          echo "list=$tags" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          build-args: COMMIT_SHA=${{ github.sha }}
          tags: ghcr.io/its-me/workflow:base

      - name: Create semver tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/its-me/workflow:base-${GITHUB_REF_NAME#v} \
            ghcr.io/its-me/workflow:base

  push-base-hub:
    name: Deploy base to Docker Hub
    needs: build-base
    runs-on: ubuntu-latest
    environment:
      name: Docker Hub
      url: https://hub.docker.com/r/1tsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Deploy
        run: |
          for tag in ${{ needs.build-base.outputs.tags }}; do
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done

  push-base-quay:
    name: Deploy base to Quay.io
    needs: build-base
    runs-on: ubuntu-latest
    environment:
      name: Quay.io
      url: https://quay.io/repository/itsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Deploy
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          for tag in ${{ needs.build-base.outputs.tags }}; do
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done

  build-successor:
    name: Build successor and store in GHCR
    needs: build-base
    runs-on: ubuntu-latest
    environment:
      name: GHCR
      url: https://ghcr.io/its-me/workflow
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.list }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          tags="successor"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tags="$tags successor-${GITHUB_REF_NAME#v}"
          fi
          echo "list=$tags" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.successor
          push: true
          build-args: COMMIT_SHA=${{ github.sha }}
          tags: ghcr.io/its-me/workflow:successor

      - name: Create semver tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/its-me/workflow:successor-${GITHUB_REF_NAME#v} \
            ghcr.io/its-me/workflow:successor

  push-successor-hub:
    name: Deploy successor to Docker Hub
    needs: build-successor
    runs-on: ubuntu-latest
    environment:
      name: Docker Hub
      url: https://hub.docker.com/r/1tsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Deploy
        run: |
          for tag in ${{ needs.build-successor.outputs.tags }}; do
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done

  push-successor-quay:
    name: Deploy successor to Quay.io
    needs: build-successor
    runs-on: ubuntu-latest
    environment:
      name: Quay.io
      url: https://quay.io/repository/itsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Deploy
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          for tag in ${{ needs.build-successor.outputs.tags }}; do
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done
