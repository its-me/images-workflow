name: Build images

on:
  push:
  workflow_dispatch:

jobs:
  build-base:
    name: "GHCR: Build and push base"
    runs-on: ubuntu-latest
    environment:
      name: GHCR
      url: https://ghcr.io/its-me/workflow
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.list }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        run: |
          tags="base"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tags="$tags base-${GITHUB_REF_NAME#v}"
          fi
          echo "list=$tags" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          build-args: COMMIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/its-me/workflow:base

      - name: Tag semver
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/its-me/workflow:base-${GITHUB_REF_NAME#v} \
            ghcr.io/its-me/workflow:base

  push-base-hub:
    name: "Docker Hub: Publish base"
    needs: build-base
    runs-on: ubuntu-slim
    environment:
      name: Docker Hub
      url: https://hub.docker.com/r/1tsme/workflow
    permissions:
      packages: read
    env:
      REPOSITORY: workflow
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Publish
        run: |
          for tag in ${{ needs.build-base.outputs.tags }}; do
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done

  push-base-quay:
    name: "Quay: Publish base"
    needs: build-base
    runs-on: ubuntu-slim
    environment:
      name: Quay.io
      url: https://quay.io/repository/itsme/workflow
    permissions:
      packages: read
    env:
      REPOSITORY: workflow
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Publish
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          for tag in ${{ needs.build-base.outputs.tags }}; do
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done

  build-successor:
    name: "GHCR: Build and push successor"
    needs: build-base
    runs-on: ubuntu-latest
    environment:
      name: GHCR
      url: https://ghcr.io/its-me/workflow
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.list }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        run: |
          tags="successor"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tags="$tags successor-${GITHUB_REF_NAME#v}"
          fi
          echo "list=$tags" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.successor
          push: true
          build-args: COMMIT_SHA=${{ github.sha }}
          tags: ghcr.io/its-me/workflow:successor

      - name: Tag semver
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/its-me/workflow:successor-${GITHUB_REF_NAME#v} \
            ghcr.io/its-me/workflow:successor

  push-successor-hub:
    name: "Docker Hub: Publish successor"
    needs: build-successor
    runs-on: ubuntu-slim
    environment:
      name: Docker Hub
      url: https://hub.docker.com/r/1tsme/workflow
    permissions:
      packages: read
    env:
      REPOSITORY: workflow
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Publish
        run: |
          for tag in ${{ needs.build-successor.outputs.tags }}; do
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done

  push-successor-quay:
    name: "Quay: Publish successor"
    needs: build-successor
    runs-on: ubuntu-slim
    environment:
      name: Quay.io
      url: https://quay.io/repository/itsme/workflow
    permissions:
      packages: read
    env:
      REPOSITORY: workflow
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Publish
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          for tag in ${{ needs.build-successor.outputs.tags }}; do
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$tag \
              ghcr.io/its-me/workflow:$tag
          done
