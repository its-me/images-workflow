name: Build images

on:
  push:
    paths-ignore:
      - HUB.md
      - QUAY.md
      - README.md
      - LICENSE
  pull_request:
  workflow_dispatch:

env:
  REPOSITORY: workflow

jobs:
  build-base:
    name: Build base (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { platform: linux/amd64,   runner: ubuntu-latest,    qemu: false }
          - { platform: linux/arm64,   runner: ubuntu-24.04-arm, qemu: false }
          - { platform: linux/arm/v7,  runner: ubuntu-24.04-arm, qemu: true  }
          - { platform: linux/arm/v6,  runner: ubuntu-24.04-arm, qemu: true  }
          - { platform: linux/386,     runner: ubuntu-latest,    qemu: true  }
          - { platform: linux/ppc64le, runner: ubuntu-latest,    qemu: true  }
          - { platform: linux/s390x,   runner: ubuntu-latest,    qemu: true  }
          - { platform: linux/riscv64, runner: ubuntu-latest,    qemu: true  }
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          platforms: ${{ matrix.platform }}
          build-args: COMMIT_SHA=${{ github.sha }}
          outputs: ${{ github.ref == 'refs/heads/main' && format('type=image,name=ghcr.io/its-me/{0},push-by-digest=true,name-canonical=true,push=true', env.REPOSITORY) || 'type=cacheonly' }}

      - name: Prepare
        if: github.ref == 'refs/heads/main'
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: base-digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  assemble-base:
    name: Assemble base in GHCR
    if: github.ref == 'refs/heads/main'
    needs: build-base
    runs-on: ubuntu-latest
    environment:
      name: GHCR
      url: https://ghcr.io/its-me/workflow
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.list }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: base-digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Resolve tags
        id: tags
        run: |
          tags="base"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tags="$tags base-${GITHUB_REF_NAME#v}"
          fi
          echo "list=$tags" >> $GITHUB_OUTPUT

      - name: Create manifest
        run: |
          for tag in ${{ steps.tags.outputs.list }}; do
            docker buildx imagetools create \
              --tag ghcr.io/its-me/$REPOSITORY:$tag \
              $(printf "ghcr.io/its-me/$REPOSITORY@sha256:%s " $(ls /tmp/digests))
          done

  push-base-hub:
    name: Deploy base to Docker Hub
    needs: assemble-base
    runs-on: ubuntu-slim
    environment:
      name: Docker Hub
      url: https://hub.docker.com/r/1tsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Deploy
        run: |
          for tag in ${{ needs.assemble-base.outputs.tags }}; do
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$tag \
              ghcr.io/its-me/$REPOSITORY:$tag
          done

  push-base-quay:
    name: Deploy base to Quay.io
    needs: assemble-base
    runs-on: ubuntu-slim
    environment:
      name: Quay.io
      url: https://quay.io/repository/itsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Deploy
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          for tag in ${{ needs.assemble-base.outputs.tags }}; do
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$tag \
              ghcr.io/its-me/$REPOSITORY:$tag
          done

  build-successor:
    name: Build successor (${{ matrix.platform }})
    if: always() && (needs.assemble-base.result == 'success' || needs.assemble-base.result == 'skipped')
    needs: assemble-base
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { platform: linux/amd64,   runner: ubuntu-latest,    qemu: false }
          - { platform: linux/arm64,   runner: ubuntu-24.04-arm, qemu: false }
          - { platform: linux/arm/v7,  runner: ubuntu-24.04-arm, qemu: true  }
          - { platform: linux/arm/v6,  runner: ubuntu-24.04-arm, qemu: true  }
          - { platform: linux/386,     runner: ubuntu-latest,    qemu: true  }
          - { platform: linux/ppc64le, runner: ubuntu-latest,    qemu: true  }
          - { platform: linux/s390x,   runner: ubuntu-latest,    qemu: true  }
          - { platform: linux/riscv64, runner: ubuntu-latest,    qemu: true  }
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.successor
          platforms: ${{ matrix.platform }}
          build-args: COMMIT_SHA=${{ github.sha }}
          outputs: ${{ github.ref == 'refs/heads/main' && format('type=image,name=ghcr.io/its-me/{0},push-by-digest=true,name-canonical=true,push=true', env.REPOSITORY) || 'type=cacheonly' }}

      - name: Prepare
        if: github.ref == 'refs/heads/main'
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: successor-digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  assemble-successor:
    name: Assemble successor in GHCR
    if: github.ref == 'refs/heads/main'
    needs: build-successor
    runs-on: ubuntu-latest
    environment:
      name: GHCR
      url: https://ghcr.io/its-me/workflow
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.list }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: successor-digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Resolve tags
        id: tags
        run: |
          tags="successor"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tags="$tags successor-${GITHUB_REF_NAME#v}"
          fi
          echo "list=$tags" >> $GITHUB_OUTPUT

      - name: Create manifest
        run: |
          for tag in ${{ steps.tags.outputs.list }}; do
            docker buildx imagetools create \
              --tag ghcr.io/its-me/$REPOSITORY:$tag \
              $(printf "ghcr.io/its-me/$REPOSITORY@sha256:%s " $(ls /tmp/digests))
          done

  push-successor-hub:
    name: Deploy successor to Docker Hub
    needs: assemble-successor
    runs-on: ubuntu-slim
    environment:
      name: Docker Hub
      url: https://hub.docker.com/r/1tsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.HUB_USERNAME }}
          password: ${{ secrets.HUB_TOKEN }}

      - name: Deploy
        run: |
          for tag in ${{ needs.assemble-successor.outputs.tags }}; do
            docker buildx imagetools create \
              --tag ${{ secrets.HUB_USERNAME }}/$REPOSITORY:$tag \
              ghcr.io/its-me/$REPOSITORY:$tag
          done

  push-successor-quay:
    name: Deploy successor to Quay.io
    needs: assemble-successor
    runs-on: ubuntu-slim
    environment:
      name: Quay.io
      url: https://quay.io/repository/itsme/workflow
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Deploy
        env:
          QUAY_NAMESPACE: ${{ secrets.QUAY_USERNAME }}
        run: |
          for tag in ${{ needs.assemble-successor.outputs.tags }}; do
            docker buildx imagetools create \
              --tag quay.io/${QUAY_NAMESPACE%%+*}/$REPOSITORY:$tag \
              ghcr.io/its-me/$REPOSITORY:$tag
          done
